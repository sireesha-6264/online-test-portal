<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Online Test Portal</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- MVC Scripts -->
    <script src="js/models/UserModel.js"></script>
    <script src="js/models/TestModel.js"></script>
    <script src="js/app.js"></script>
    <script src="js/views/TestView.js"></script>
    <script src="js/controllers/TestController.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userModel = new UserModel();
            const testModel = new TestModel();
            const testView = new TestView();
            const testController = new TestController(userModel, testModel, testView);
            testController.init();
        });
    </script>
</head>
<body>
    <div class="test-header">
        <h2>Online Assessment</h2>
        <div class="timer" id="timer">25:00</div>
    </div>
    
    <div class="container" style="max-width: 800px; padding-top: 2rem;">
        <form id="testForm">
            <div id="questionsContainer">
                <!-- Questions will be injected here dynamically -->
            </div>
            
            <div style="text-align: center; margin: 2rem 0;">
                <button type="submit" class="btn btn-primary" style="max-width: 200px;">Submit Test</button>
            </div>
        </form>
    </div>
    
    <!-- Custom Modal Popup -->
    <div id="alertModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="color: var(--success-color); margin-bottom: 1rem;" id="modalTitle">Test Submitted!</h3>
            <p id="modalMessage" style="white-space: pre-line; line-height: 1.5; font-size: 1.1rem;"></p>
            <button id="closeModal" class="btn btn-primary" style="margin-top: 1.5rem;">View Detailed Results</button>
        </div>
    </div>
</body>
</html>
