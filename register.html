<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Test Portal</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- MVC Scripts -->
    <script src="js/models/UserModel.js"></script>
    <script src="js/models/TestModel.js"></script>
    <script src="js/app.js"></script>
    <script src="js/views/AuthView.js"></script>
    <script src="js/controllers/AuthController.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userModel = new UserModel();
            const authView = new AuthView();
            const authController = new AuthController(userModel, authView);
            authController.initRegister();
        });
    </script>
</head>
<body>
    <div class="center-form-container">
        <div class="auth-card" style="max-width: 550px;">
            <h1>Register New Account</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label for="rollNumber">Roll Number</label>
                    <input type="text" id="rollNumber" class="form-control" required>
                    <span id="rollNumberError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <label for="email">Email ID</label>
                    <input type="email" id="email" class="form-control" required>
                    <span id="emailError" class="error-message"></span>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" required>
                    <span id="phoneError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" class="form-control" required>
                    <div class="password-criteria" id="passwordCriteria">
                        <div class="criteria-item" id="crit-length">✗ 8-11 characters</div>
                        <div class="criteria-item" id="crit-upper">✗ One uppercase letter</div>
                        <div class="criteria-item" id="crit-lower">✗ One lowercase letter</div>
                        <div class="criteria-item" id="crit-number">✗ One number</div>
                        <div class="criteria-item" id="crit-special">✗ One special symbol</div>
                    </div>
                    <span id="passwordError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <label for="rePassword">Re-enter Password</label>
                    <input type="password" id="rePassword" class="form-control" required>
                    <span id="rePasswordError" class="error-message"></span>
                </div>
                
                <div id="successMessage" class="success-message">Account created successfully</div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Register</button>
                <a href="login.html" class="btn btn-secondary">Back to Login</a>
            </form>
        </div>
    </div>
</body>
</html>
