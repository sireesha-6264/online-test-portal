<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Online Test Portal</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- MVC Scripts -->
    <script src="js/models/UserModel.js"></script>
    <script src="js/models/TestModel.js"></script>
    <script src="js/app.js"></script>
    <script src="js/views/DashboardView.js"></script>
    <script src="js/controllers/DashboardController.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userModel = new UserModel();
            const testModel = new TestModel();
            const dashboardView = new DashboardView();
            const dashboardController = new DashboardController(userModel, testModel, dashboardView);
            dashboardController.init();
        });
    </script>
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <h1 id="welcomeMessage">Welcome</h1>
            <button onclick="logout()" class="btn btn-secondary" style="margin-top: 0; width: auto;">Logout</button>
        </header>

        <div class="dashboard-cards">
            <div class="card">
                <h2>Test Center</h2>
                <p style="margin: 1rem 0; color: var(--text-muted);">Take the online assessment</p>
                <button id="btnTakeTest" class="btn btn-primary">Take Test</button>
            </div>
            <div class="card">
                <h2>My Performance</h2>
                <p style="margin: 1rem 0; color: var(--text-muted);">View your previous test results</p>
                <button id="btnShowResult" class="btn btn-primary" style="margin-top: 0;">Show Result</button>
            </div>
        </div>
    </div>

    <!-- Custom Modal Popup -->
    <div id="alertModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="color: var(--error-color); margin-bottom: 1rem;">Notice</h3>
            <p id="modalMessage">User already completed the test</p>
            <button id="closeModal" class="btn btn-primary" style="margin-top: 1.5rem;">OK</button>
        </div>
    </div>
</body>
</html>
